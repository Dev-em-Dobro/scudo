services:
  postgres:
    image: postgres:16-alpine
    container_name: carrer-quest-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: carrer_quest_local
      POSTGRES_USER: carrer_quest
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carrer_quest -d carrer_quest_local"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_local_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: carrer-quest-pgadmin-local
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_local_only}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_local_data:/var/lib/pgadmin

volumes:
  postgres_local_data:
  pgadmin_local_data:
